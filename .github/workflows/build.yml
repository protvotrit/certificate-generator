name: Build EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow customtkinter pandas openpyxl

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconsole --onefile --name "CertGen_V2" --add-data "views;views" --add-data "models;models" --add-data "controllers;controllers" main.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CertGen_V2.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}